<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SignalFlow · Noticias</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090d">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root{--bg:#08090d;--s1:#0e1018;--s2:#13161f;--s3:#1a1e2a;--border:#1f2435;--border2:#262c3d;--long:#00e5a0;--long-dim:rgba(0,229,160,0.1);--short:#ff4466;--short-dim:rgba(255,68,102,0.1);--neutral:#f5a623;--neutral-dim:rgba(245,166,35,0.1);--text:#e2e8f4;--muted:#5a6278;--muted2:#3d4358;--accent:#5b6ef5;--accent2:#7c8cf8;--mono:'IBM Plex Mono',monospace;--sans:'Inter',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}html{font-size:14px;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:48px;}
/* HEADER */
.header{padding:14px 16px 10px;border-bottom:1px solid var(--border);background:var(--s1);position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:8px;min-width:0;}
.logo-icon{width:26px;height:26px;background:linear-gradient(135deg,var(--accent),#9b6ef5);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;}
.logo-text{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px;}
.logo-text span{color:var(--accent2);}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.status-bar{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;color:var(--muted);}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--long);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
.back-link{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--s3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap;}
.back-link:hover{border-color:var(--accent2);color:var(--accent2);}
.refresh-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--s3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent2);}
.refresh-btn.loading .spin{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.countdown-row{display:flex;align-items:center;justify-content:flex-end;gap:6px;font-family:var(--mono);font-size:9px;color:var(--muted2);}
.countdown-bar-wrap{flex:1;max-width:100px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
.countdown-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear;}
/* FILTER BAR */
.filter-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--s1);}
.filter-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;}
.filter-chip{padding:5px 10px;background:var(--s3);border:1px solid var(--border2);border-radius:8px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-chip:hover{border-color:var(--accent2);color:var(--accent2);}
.filter-chip.active-all{background:rgba(91,110,245,.12);border-color:var(--accent);color:var(--accent2);}
.filter-chip.active-bull{background:rgba(0,229,160,.1);border-color:var(--long);color:var(--long);}
.filter-chip.active-bear{background:rgba(255,68,102,.1);border-color:var(--short);color:var(--short);}
.filter-chip.active-neut{background:rgba(245,166,35,.1);border-color:var(--neutral);color:var(--neutral);}
/* IMPACT FILTER */
.impact-bar{padding:8px 16px;border-bottom:1px solid var(--border);background:var(--s1);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.impact-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.impact-chip{padding:4px 10px;background:var(--s3);border:1px solid var(--border2);border-radius:6px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;}
.impact-chip.active{background:rgba(91,110,245,.1);border-color:var(--accent);color:var(--accent2);}
.impact-chip.high.active{background:rgba(255,68,102,.1);border-color:var(--short);color:var(--short);}
.impact-chip.medium.active{background:rgba(245,166,35,.1);border-color:var(--neutral);color:var(--neutral);}
.impact-chip.low.active{background:rgba(0,229,160,.07);border-color:var(--long);color:var(--long);}
/* STATS BAR */
.stats-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--s2);display:flex;gap:12px;flex-wrap:wrap;}
.stat-item{display:flex;flex-direction:column;gap:2px;}
.stat-label{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.stat-val{font-family:var(--mono);font-size:13px;font-weight:700;}
.stat-val.bull{color:var(--long);}
.stat-val.bear{color:var(--short);}
.stat-val.neut{color:var(--neutral);}
/* MAIN */
.main{padding:12px 16px;}
/* ASSET GROUP */
.asset-group{margin-bottom:16px;}
.asset-group-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 12px;background:var(--s1);border:1px solid var(--border);border-radius:10px;cursor:pointer;user-select:none;}
.asset-group-icon{font-size:16px;}
.asset-group-name{font-family:var(--mono);font-size:12px;font-weight:700;}
.asset-group-count{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;}
.asset-group-count.bull{background:rgba(0,229,160,.15);color:var(--long);border:1px solid rgba(0,229,160,.2);}
.asset-group-count.bear{background:rgba(255,68,102,.15);color:var(--short);border:1px solid rgba(255,68,102,.2);}
.asset-group-count.neut{background:rgba(245,166,35,.1);color:var(--neutral);border:1px solid rgba(245,166,35,.2);}
.asset-group-count.empty{background:var(--s3);color:var(--muted);border:1px solid var(--border2);}
.asset-group-chevron{margin-left:auto;font-size:10px;color:var(--muted);transition:transform .2s;}
.asset-group.collapsed .asset-group-chevron{transform:rotate(-90deg);}
.asset-group-items{display:flex;flex-direction:column;gap:7px;}
.asset-group.collapsed .asset-group-items{display:none;}
/* NEWS CARD */
.news-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:6px;position:relative;transition:border-color .15s;}
.news-card:hover{border-color:var(--border2);}
.news-card.high-bull{border-color:rgba(0,229,160,.3);background:rgba(0,229,160,.035);}
.news-card.high-bear{border-color:rgba(255,68,102,.3);background:rgba(255,68,102,.035);}
.news-card.med-bull{border-color:rgba(0,229,160,.15);}
.news-card.med-bear{border-color:rgba(255,68,102,.15);}
.news-card.expired{opacity:.4;filter:grayscale(.7);}
.news-card-top{display:flex;align-items:flex-start;gap:8px;}
.news-card-title{font-size:11px;color:var(--text);line-height:1.45;flex:1;font-weight:500;}
.news-card-badges{display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0;}
.impact-badge{font-family:var(--mono);font-size:7px;padding:2px 5px;border-radius:3px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.impact-badge.high.bull{background:rgba(0,229,160,.2);color:var(--long);border:1px solid rgba(0,229,160,.3);}
.impact-badge.high.bear{background:rgba(255,68,102,.2);color:var(--short);border:1px solid rgba(255,68,102,.3);}
.impact-badge.med.bull{background:rgba(0,229,160,.1);color:var(--long);}
.impact-badge.med.bear{background:rgba(255,68,102,.1);color:var(--short);}
.impact-badge.low{background:var(--s3);color:var(--muted);}
.direction-badge{font-family:var(--mono);font-size:7px;padding:2px 5px;border-radius:3px;font-weight:700;letter-spacing:.3px;}
.direction-badge.bull{background:rgba(0,229,160,.15);color:var(--long);}
.direction-badge.bear{background:rgba(255,68,102,.15);color:var(--short);}
.news-card-meta{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:8px;color:var(--muted2);flex-wrap:wrap;}
.news-card-src{color:var(--muted);}
.news-card-time{color:var(--muted2);}
.news-card-ny{color:var(--accent2);font-weight:700;}
.news-card-link{color:var(--accent2);text-decoration:none;}
.news-card-link:hover{text-decoration:underline;}
.ttl-bar{height:2px;border-radius:1px;background:var(--border2);margin-top:4px;overflow:hidden;}
.ttl-fill{height:100%;border-radius:1px;transition:width 1s linear;}
.ttl-fill.high{background:var(--short);}
.ttl-fill.medium{background:var(--neutral);}
.ttl-fill.low{background:var(--long);}
/* EMPTY / LOADING */
.empty-state{text-align:center;padding:60px 24px;color:var(--muted);}
.empty-icon{font-size:38px;margin-bottom:12px;}
.empty-title{font-size:14px;font-weight:600;margin-bottom:5px;color:var(--text);}
.empty-sub{font-size:12px;line-height:1.6;}
.loading-card{height:70px;background:var(--s1);border:1px solid var(--border);border-radius:12px;animation:shimmer 1.5s infinite;background-size:200% 100%;background-image:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%);}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
/* ALL NEWS SECTION */
.all-news-section{margin-top:20px;}
.section-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:4px;}
/* TOAST */
.toast{position:fixed;top:16px;right:16px;background:var(--s3);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:12px;z-index:999;max-width:240px;transform:translateX(120%);transition:transform .3s ease;}
.toast.show{transform:translateX(0);}
.toast.success{border-color:var(--long);}
.toast.error{border-color:var(--short);}
.toast.info{border-color:var(--accent);}
/* SIGNAL BANNER */
.signal-banner{display:none;padding:7px 16px;border-bottom:1px solid var(--border);background:var(--s1);overflow-x:auto;white-space:nowrap;}
.signal-banner.has-signals{display:block;}
.signal-banner-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-right:8px;}
.signal-pill-banner{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.4px;margin-right:6px;text-decoration:none;}
.signal-pill-banner.LONG{background:rgba(0,229,160,.12);color:var(--long);border:1px solid rgba(0,229,160,.25);}
.signal-pill-banner.SHORT{background:rgba(255,68,102,.12);color:var(--short);border:1px solid rgba(255,68,102,.25);}
</style>
</head>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ── CONSTANTES ────────────────────────────────────────────────────────────────
const NEWS_REFRESH_SECONDS = 300; // 5 minutos
const TTL_BY_IMPACT = { high: 6*3600*1000, medium: 12*3600*1000, low: 36*3600*1000 };
const TICKER_TERMS = {
  BTC:['bitcoin','btc'], ETH:['ethereum','eth'], SOL:['solana','sol'],
  BNB:['bnb','binance coin','binance smart'], XRP:['xrp','ripple'],
  ADA:['cardano','ada'], DOGE:['dogecoin','doge'], AVAX:['avalanche','avax'],
  DOT:['polkadot','dot'], LINK:['chainlink','link'], MATIC:['polygon','matic'],
  NEAR:['near protocol','near'], UNI:['uniswap','uni'], ATOM:['cosmos','atom'],
  HYPE:['hyperliquid','hype'], SUI:['sui network','sui'], APT:['aptos','apt'],
  INJ:['injective','inj'], TIA:['celestia','tia'], OP:['optimism',' op ','op network'],
  ARB:['arbitrum','arb'], ZEC:['zcash','zec'], TAO:['bittensor','tao'],
  CRYPTO:['crypto','defi','blockchain','token','coin','market','trading'],
};
const BULL_WORDS = ['surge','surging','surged','rally','rallying','breakout','broke out','all-time high','ath','record high','gains','gained','rising','rises','pumps','bullish','approved','approval','etf','launch','partnership','upgrade','milestone','accumulation','institutional','demand','growth','recover','rebound','sube','alza','récord','máximo','adoptado','aprobado','alcista','recupera','rebote'];
const BEAR_WORDS = ['crash','crashing','crashed','drop','dropping','dropped','plunge','plunging','dump','dumping','sell-off','selloff','decline','declining','falls','fell','bear','bearish','ban','banned','hack','hacked','exploit','liquidation','fear','lawsuit','investigation','fine','risk','warning','delist','collapse','bankruptcy','cae','baja','caída','prohibición','hackeo','temor','bajista','colapso','desplome'];
const HIGH_IMPACT_WORDS = ['etf','all-time high','ath','crash','ban','hack','exploit','sec','approval','lawsuit','federal reserve','fed','blackrock','fidelity','record','billion','trillion','halving','fork','collapse','bankruptcy','aprobación','récord','prohibición','quiebra'];
const MEDIUM_IMPACT_WORDS = ['partnership','launch','listing','milestone','adoption','investment','fund','exchange','protocol','upgrade','staking','asociación','lanzamiento','actualización','listado','inversión'];
const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
const RSS_FEEDS = [
  {name:'Cointelegraph',url:'https://cointelegraph.com/rss'},
  {name:'CryptoSlate',url:'https://cryptoslate.com/feed/'},
  {name:'The Block',url:'https://www.theblock.co/rss.xml'},
  {name:'Decrypt',url:'https://decrypt.co/feed'},
  {name:'CoinDesk',url:'https://www.coindesk.com/arc/outboundfeeds/rss/'},
];
const CG_ICON_IDS = {BTC:'bitcoin',ETH:'ethereum',SOL:'solana',BNB:'binancecoin',XRP:'ripple',ADA:'cardano',DOGE:'dogecoin',AVAX:'avalanche-2',DOT:'polkadot',LINK:'chainlink',MATIC:'polygon',NEAR:'near',UNI:'uniswap',ATOM:'cosmos',HYPE:'hyperliquid',SUI:'sui',APT:'aptos',INJ:'injective-protocol',TIA:'celestia',OP:'optimism',ARB:'arbitrum',ZEC:'zcash',TAO:'bittensor'};
const TICKER_EMOJIS = {BTC:'₿',ETH:'Ξ',SOL:'◎',BNB:'⬡',XRP:'✕',ADA:'₳',DOGE:'Ð',HYPE:'H',LINK:'⬡',UNI:'🦄',CRYPTO:'🌐'};

// ── ESTADO ─────────────────────────────────────────────────────────────────────
let sentimentFilter = 'all';
let impactFilter = {high:true, medium:true, low:true};
let allNewsData = {}; // { ticker: { items, ts, newsSignal } }
let countdown = NEWS_REFRESH_SECONDS;
let cdTimer = null;
let isRefreshing = false;

let savedAssets = [];
try { savedAssets = JSON.parse(localStorage.getItem('sf_assets')||'[]'); } catch(e){}
if(!savedAssets.length) savedAssets = ['BTC','ETH','SOL','BNB','XRP','ARB'];
// Always add a CRYPTO (general) bucket
const DISPLAY_ASSETS = [...savedAssets, 'CRYPTO'];

// ── TRANSLATE ─────────────────────────────────────────────────────────────────
const TRANSLATE_CACHE = {};
async function translateToSpanish(text){
  if(!text) return text;
  const key = text.slice(0,200);
  if(TRANSLATE_CACHE[key]) return TRANSLATE_CACHE[key];
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 6000);
  try{
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=es&dt=t&q=${encodeURIComponent(text)}`;
    const r = await fetch(url, {signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok) return text;
    const data = await r.json();
    const translated = (data[0]||[]).map(seg=>seg[0]).join('').trim();
    const result = translated || text;
    TRANSLATE_CACHE[key] = result;
    return result;
  }catch(e){ clearTimeout(t); return text; }
}

// ── SENTIMENT & IMPACT SCORING ────────────────────────────────────────────────
function scoreSentiment(text){
  const t = text.toLowerCase();
  let bull=0, bear=0;
  BULL_WORDS.forEach(w=>{ if(t.includes(w)) bull++; });
  BEAR_WORDS.forEach(w=>{ if(t.includes(w)) bear++; });
  return {bull, bear, net:bull-bear};
}
function scoreImpact(text){
  const t = text.toLowerCase();
  if(HIGH_IMPACT_WORDS.some(w=>t.includes(w))) return 'high';
  if(MEDIUM_IMPACT_WORDS.some(w=>t.includes(w))) return 'medium';
  return 'low';
}
function tickerInText(ticker, text){
  const t = text.toLowerCase();
  const terms = TICKER_TERMS[ticker] || [ticker.toLowerCase()];
  return terms.some(k=>t.includes(k));
}
function enrichItem(item){
  const full = (item.title||'')+' '+(item.desc||'');
  const sent = scoreSentiment(full);
  const impact = scoreImpact(full);
  let direction = 'neutral';
  if(sent.net>=1) direction='bull';
  else if(sent.net<=-1) direction='bear';
  const now = Date.now();
  const age = now - (item.pubDate||now);
  const ttl = TTL_BY_IMPACT[impact];
  const expired = age > ttl;
  const ttlPct = Math.max(0, Math.min(100, (1 - age/ttl)*100));
  return {...item, sent, impact, direction, expired, ttlPct, age};
}

// ── FETCH NEWS ────────────────────────────────────────────────────────────────
async function fetchCoinGeckoNews(){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 8000);
  try{
    const r = await fetch('https://api.coingecko.com/api/v3/news', {signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok) return [];
    const d = await r.json();
    const cutoff = Date.now() - 48*3600*1000;
    return (d.data||d||[]).slice(0,60).map(n=>({
      title:n.title||n.name||'',
      desc:n.description||n.author||'',
      link:n.url||n.news_url||'',
      pubDate:n.updated_at?n.updated_at*1000:(n.published_at?n.published_at*1000:Date.now()),
      source:'CoinGecko News',
    })).filter(n=>n.pubDate>cutoff);
  }catch(e){ clearTimeout(t); return []; }
}
async function fetchRSSFeed(feed){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 8000);
  try{
    const r = await fetch(RSS2JSON+encodeURIComponent(feed.url), {signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok) return [];
    const d = await r.json();
    if(d.status!=='ok'||!Array.isArray(d.items)) return [];
    const cutoff = Date.now() - 48*3600*1000;
    return d.items.slice(0,40).map(n=>({
      title:n.title||'',
      desc:(n.description||'').replace(/<[^>]+>/g,'').slice(0,300),
      link:n.link||'',
      pubDate:n.pubDate?new Date(n.pubDate).getTime():Date.now(),
      source:feed.name,
    })).filter(n=>n.pubDate>cutoff);
  }catch(e){ clearTimeout(t); return []; }
}

async function fetchAllNews(){
  const [cgItems, ...rssResults] = await Promise.all([
    fetchCoinGeckoNews(),
    ...RSS_FEEDS.map(f=>fetchRSSFeed(f)),
  ]);
  const raw = [...cgItems, ...rssResults.flat()];
  // Dedup by title
  const seen = new Set();
  const unique = raw.filter(n=>{
    const k = (n.title||'').substring(0,60).toLowerCase().trim();
    if(!k||seen.has(k)) return false;
    seen.add(k); return true;
  });
  return unique;
}

// ── ORGANIZE NEWS BY TICKER ────────────────────────────────────────────────────
function organizeByTicker(items){
  const result = {};
  DISPLAY_ASSETS.forEach(ticker=>{ result[ticker]=[]; });
  // First pass: assign to tickers
  const assigned = new Set();
  items.forEach((item,idx)=>{
    let matched = false;
    for(const ticker of DISPLAY_ASSETS){
      if(ticker==='CRYPTO') continue;
      if(tickerInText(ticker, (item.title||'')+' '+(item.desc||''))){
        if(!result[ticker]) result[ticker]=[];
        result[ticker].push(enrichItem(item));
        matched = true;
        assigned.add(idx);
      }
    }
    if(!matched){
      // General crypto news goes to CRYPTO bucket
      if(tickerInText('CRYPTO', (item.title||'')+' '+(item.desc||''))){
        if(!result['CRYPTO']) result['CRYPTO']=[];
        result['CRYPTO'].push(enrichItem(item));
        assigned.add(idx);
      }
    }
  });
  // Sort each ticker's items: impact first, then recency
  const w = {high:3,medium:1.5,low:0.5};
  Object.keys(result).forEach(ticker=>{
    result[ticker].sort((a,b)=>(w[b.impact]||0)-(w[a.impact]||0)||(b.pubDate||0)-(a.pubDate||0));
  });
  return result;
}

// ── TIME FORMATTING ────────────────────────────────────────────────────────────
function formatCuba(ts){
  if(!ts) return '—';
  return new Date(ts).toLocaleTimeString('en-US',{
    timeZone:'America/Havana',hour:'2-digit',minute:'2-digit',hour12:false,
  })+' CUBA · '+new Date(ts).toLocaleDateString('es-ES',{
    timeZone:'America/Havana',day:'2-digit',month:'2-digit',
  });
}
function elapsedStr(ts){
  if(!ts) return '—';
  const diff = Date.now()-ts;
  if(diff<0) return 'ahora';
  const s=Math.floor(diff/1000), m=Math.floor(s/60), h=Math.floor(m/60), d=Math.floor(h/24);
  if(d>0) return `hace ${d}d ${h%24}h`;
  if(h>0) return `hace ${h}h ${m%60}m`;
  if(m>0) return `hace ${m}m`;
  return `hace ${s}s`;
}

// ── COMPUTE NEWS SIGNAL ────────────────────────────────────────────────────────
function computeSignal(items){
  if(!items.length) return {signal:'neutral',label:'Sin noticias'};
  const w = {high:3,medium:1.5,low:0.5};
  let bullW=0, bearW=0;
  items.filter(i=>!i.expired).forEach(i=>{ const v=w[i.impact]||0.5; if(i.direction==='bull') bullW+=v; else if(i.direction==='bear') bearW+=v; });
  const net = bullW-bearW;
  if(net>=3) return {signal:'bull',label:`${items.filter(i=>i.direction==='bull').length} alcistas`};
  if(net<=-3) return {signal:'bear',label:`${items.filter(i=>i.direction==='bear').length} bajistas`};
  if(net>=1.5) return {signal:'bull',label:'Ligeramente alcistas'};
  if(net<=-1.5) return {signal:'bear',label:'Ligeramente bajistas'};
  return {signal:'neutral',label:'Noticias mixtas'};
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function getFilteredItems(items){
  return items.filter(item=>{
    if(sentimentFilter!=='all' && item.direction!==sentimentFilter) return false;
    if(!impactFilter[item.impact]) return false;
    return true;
  });
}

function renderNewsCard(item){
  const boxCls = item.impact==='high'?(item.direction==='bull'?'high-bull':'high-bear'):item.impact==='medium'?(item.direction==='bull'?'med-bull':'med-bear'):'';
  const impCls = item.impact==='high'?`high ${item.direction}`:item.impact==='medium'?`med ${item.direction}`:'low';
  const impLbl = item.impact==='high'?'🔴 ALTO':item.impact==='medium'?'🟡 MEDIO':'🟢 BAJO';
  const dirLbl = item.direction==='bull'?'↑ ALCISTA':item.direction==='bear'?'↓ BAJISTA':null;
  const dirCls = item.direction==='bull'?'bull':item.direction==='bear'?'bear':'';
  const expiredCls = item.expired?'expired':'';
  const title = (item.titleEs||item.title||'').substring(0,130)+((item.titleEs||item.title||'').length>130?'…':'');
  const ttlColor = item.impact==='high'?'high':item.impact==='medium'?'medium':'low';
  return `<div class="news-card ${boxCls} ${expiredCls}">
    <div class="news-card-top">
      <div class="news-card-title">${title}${item.expired?'<span style="font-size:9px;color:var(--muted);margin-left:4px;">(caducada)</span>':''}</div>
      <div class="news-card-badges">
        <span class="impact-badge ${impCls}">${impLbl}</span>
        ${dirLbl?`<span class="direction-badge ${dirCls}">${dirLbl}</span>`:''}
      </div>
    </div>
    <div class="news-card-meta">
      <span class="news-card-src">${item.source}</span>
      <span>·</span>
      <span class="news-card-time">${elapsedStr(item.pubDate)}</span>
      <span>·</span>
      <span class="news-card-ny">${formatCuba(item.pubDate)}</span>
      ${item.link?`<a class="news-card-link" href="${item.link}" target="_blank" rel="noopener">abrir ↗</a>`:''}
    </div>
    <div class="ttl-bar"><div class="ttl-fill ${ttlColor}" style="width:${item.ttlPct.toFixed(1)}%"></div></div>
  </div>`;
}

function renderAssetGroup(ticker, items){
  const filtered = getFilteredItems(items);
  const signal = computeSignal(items.filter(i=>!i.expired));
  const sigCls = signal.signal==='bull'?'bull':signal.signal==='bear'?'bear':'neut';
  const sigEmoji = signal.signal==='bull'?'📈':signal.signal==='bear'?'📉':'➖';
  const countCls = filtered.length===0?'empty':sigCls;
  const emj = TICKER_EMOJIS[ticker]||ticker.charAt(0);
  const groupId = `group-${ticker}`;
  const isCollapsed = filtered.length===0;
  return `<div class="asset-group ${isCollapsed?'collapsed':''}" id="${groupId}">
    <div class="asset-group-header" onclick="toggleGroup('${ticker}')">
      <span class="asset-group-icon">${emj}</span>
      <span class="asset-group-name">${ticker==='CRYPTO'?'Mercado General':ticker+'/USDT'}</span>
      <span class="asset-group-count ${countCls}">${sigEmoji} ${signal.label} · ${filtered.length} noticias</span>
      <span class="asset-group-chevron">▾</span>
    </div>
    <div class="asset-group-items">
      ${filtered.length?filtered.map(renderNewsCard).join(''):'<div style="font-family:var(--mono);font-size:9px;color:var(--muted);padding:8px 12px;">Sin noticias con los filtros actuales</div>'}
    </div>
  </div>`;
}

function updateStats(){
  const all = Object.values(allNewsData).flat();
  const active = all.filter(i=>!i.expired);
  document.getElementById('statTotal').textContent = active.length;
  document.getElementById('statBull').textContent = active.filter(i=>i.direction==='bull').length;
  document.getElementById('statBear').textContent = active.filter(i=>i.direction==='bear').length;
  document.getElementById('statHigh').textContent = active.filter(i=>i.impact==='high').length;
  document.getElementById('statAssets').textContent = Object.keys(allNewsData).filter(t=>allNewsData[t].some(i=>!i.expired)).length;
}

async function renderAll(){
  const main = document.getElementById('mainContent');
  const tickers = DISPLAY_ASSETS.filter(t=>allNewsData[t]&&allNewsData[t].length);
  if(!tickers.length){
    main.innerHTML = `<div class="empty-state"><div class="empty-icon">📰</div><div class="empty-title">Sin noticias encontradas</div><div class="empty-sub">No hay noticias relevantes en las últimas 48h para tus activos monitorizados.</div></div>`;
    return;
  }
  // Translate top items (async, render after)
  const allItems = Object.values(allNewsData).flat();
  await Promise.all(allItems.slice(0,30).map(async item=>{
    if(!item.titleEs) item.titleEs = await translateToSpanish(item.title);
  }));
  let html = '';
  // Show tickers with news first (sorted by news count), then empty
  const sorted = DISPLAY_ASSETS.slice().sort((a,b)=>{
    const ca = (allNewsData[a]||[]).filter(i=>!i.expired).length;
    const cb = (allNewsData[b]||[]).filter(i=>!i.expired).length;
    return cb-ca;
  });
  sorted.forEach(ticker=>{
    const items = allNewsData[ticker]||[];
    html += renderAssetGroup(ticker, items);
  });
  main.innerHTML = html;
  updateStats();
}

function toggleGroup(ticker){
  const el = document.getElementById(`group-${ticker}`);
  if(el) el.classList.toggle('collapsed');
}

function setSentimentFilter(f){
  sentimentFilter = f;
  ['all','bull','bear','neut'].forEach(s=>{
    const chip = document.getElementById(`chip-${s}`);
    if(chip){
      chip.className = 'filter-chip'+(s===f?` active-${s==='all'?'all':s}`:' ');
    }
  });
  renderAll();
}
function toggleImpact(level){
  impactFilter[level] = !impactFilter[level];
  const el = document.getElementById(`imp-${level}`);
  if(el) el.classList.toggle('active', impactFilter[level]);
  renderAll();
}

// ── MAIN LOAD ─────────────────────────────────────────────────────────────────
async function loadNews(){
  if(isRefreshing) return;
  isRefreshing = true;
  setRefreshing(true);
  try{
    const main = document.getElementById('mainContent');
    if(!Object.keys(allNewsData).length){
      main.innerHTML = Array(6).fill('<div class="loading-card" style="margin-bottom:8px"></div>').join('');
    }
    const rawItems = await fetchAllNews();
    allNewsData = organizeByTicker(rawItems);
    await renderAll();
    document.getElementById('lastUpdate').textContent = '· '+new Date().toLocaleTimeString('en-US',{timeZone:'America/Havana',hour:'2-digit',minute:'2-digit',hour12:false})+' CUBA';
    showToast(`📰 ${rawItems.length} noticias actualizadas`,'success');
  }catch(e){
    showToast('Error cargando noticias','error');
  }finally{
    isRefreshing = false;
    setRefreshing(false);
  }
}
function setRefreshing(on){
  document.getElementById('refreshBtn').classList.toggle('loading',on);
  document.getElementById('refreshBtn').disabled = on;
}
function manualRefresh(){
  loadNews();
  countdown = NEWS_REFRESH_SECONDS;
}
function startCountdown(){
  clearInterval(cdTimer);
  cdTimer = setInterval(()=>{
    countdown--;
    document.getElementById('countdownDisplay').textContent = countdown+'s';
    document.getElementById('countdownBar').style.width = (countdown/NEWS_REFRESH_SECONDS*100)+'%';
    if(countdown<=0){ countdown=NEWS_REFRESH_SECONDS; loadNews(); }
    // Also refresh elapsed strings every 30s
    if(countdown%30===0) refreshElapsed();
  },1000);
}
function refreshElapsed(){
  // Re-render only timestamps without full reload
  const items = Object.values(allNewsData).flat();
  // Update TTL bars and expired states
  items.forEach(item=>{ const age=Date.now()-(item.pubDate||Date.now()); item.ttlPct=Math.max(0,Math.min(100,(1-age/TTL_BY_IMPACT[item.impact])*100)); item.expired=age>TTL_BY_IMPACT[item.impact]; });
}
function refreshSignalBanner(){
  try{
    const signals = JSON.parse(localStorage.getItem('sf_active_signals')||'[]');
    const cutoff = Date.now()-2*3600*1000;
    const fresh = signals.filter(s=>s.ts>cutoff&&(s.signal==='LONG'||s.signal==='SHORT'));
    const banner = document.getElementById('signalBanner');
    const content = document.getElementById('signalBannerContent');
    if(!fresh.length){ banner.classList.remove('has-signals'); return; }
    banner.classList.add('has-signals');
    content.innerHTML = fresh.map(s=>{
      const age=Math.round((Date.now()-s.ts)/60000);
      const ageStr=age<1?'ahora':age<60?`hace ${age}m`:`hace ${Math.floor(age/60)}h`;
      return `<a class="signal-pill-banner ${s.signal}" href="index.html">${s.signal==='LONG'?'↑':'↓'} ${s.ticker} ${s.signal} <span style="font-size:8px;opacity:.7">${ageStr}</span></a>`;
    }).join('');
  }catch(e){}
}
let toastTimer=null;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}

// ── NOTIFICACIONES DE LIQUIDACIONES DESDE LIQUIDACIONES.HTML ─────────────────
let seenLiqBroadcast = new Set();
try{ const arr=JSON.parse(localStorage.getItem('sf_seen_liq_bcast_news')||'[]'); seenLiqBroadcast=new Set(arr); }catch(e){}
function checkLiqBroadcast(){
  try{
    const events = JSON.parse(localStorage.getItem('sf_liq_broadcast')||'[]');
    const cutoff = Date.now()-3600000; let changed=false;
    events.filter(e=>e.time>cutoff).forEach(ev=>{
      if(seenLiqBroadcast.has(ev.key)) return;
      seenLiqBroadcast.add(ev.key); changed=true;
      const isLong=ev.side.includes('Long');
      const fmtU=v=>v>=1e9?'$'+(v/1e9).toFixed(2)+'B':v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(2)+'K':'$'+v.toFixed(0);
      const fmtP=p=>p>=1000?p.toLocaleString('es-ES',{maximumFractionDigits:2}):p>=1?p.toFixed(4):p.toFixed(6);
      showToast(`💥 Liq ${ev.ticker}: ${ev.side} ${fmtU(ev.amount)} @ ${fmtP(ev.price)}`, isLong?'success':'error');
      if('Notification' in window && Notification.permission==='granted'){
        try{ new Notification(`💥 Liquidación ${ev.ticker}`,{body:`${ev.side}: ${fmtU(ev.amount)} @ ${fmtP(ev.price)}`,tag:ev.key}); }catch(e){}
      }
    });
    if(changed) try{ localStorage.setItem('sf_seen_liq_bcast_news', JSON.stringify([...seenLiqBroadcast].slice(-200))); }catch(e){}
  }catch(e){}
}

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
(function init(){
  refreshSignalBanner();
  setInterval(refreshSignalBanner,15000);
  checkLiqBroadcast();
  setInterval(checkLiqBroadcast, 20000);
  window.addEventListener('storage', e=>{ if(e.key==='sf_liq_broadcast') checkLiqBroadcast(); });
  loadNews();
  startCountdown();
})();
</script>
